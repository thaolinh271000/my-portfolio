<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="root.css">
    <style>
        /* navigation */
        nav {
            display: flex;
            justify-content: center;
            gap: 80px;
            background-color: white;
            height: 80px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        nav a {
            color: var(--mainColor2);
        }

        nav a::after {
            background-color: var(--mainColor2);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* body general */
        section {
            width: 1380px;
            margin: 0 auto;
            gap: 40px;
            display: flex;
            flex-direction: column;
            gap: 80px;
        }

        /* title */
        .title {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .title h1 {
            font-weight: var(--fontRegular);
            font-size: var(--fontSizeH1);
        }

        .line {
            width: 1px;
            align-self: stretch;
            background-color: var(--mainColor2);
        }

        /* video */
        section .year {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .video {
            display: flex;
            flex-direction: column;
            gap: 20px;
            cursor: pointer;
        }

        .video .thumbnail {
            width: 100%;
            aspect-ratio: 3 / 2;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 5px;

            position: relative;
            overflow: hidden;
            transition: background-size 0.6s cubic-bezier(.2, .8, .2, 1);
        }

        .video .thumbnail.pic-matcha {
            background-size: 100% auto;
            background-image: url(pics/video_matcha.PNG);
        }

        .video .thumbnail.pic-train {
            background-size: auto 100%;
            background-image: url(pics/video_train.PNG);
        }

        .video .thumbnail.pic-faifo {
            background-size: auto 100%;
            background-image: url(pics/video_faifo.PNG);
        }

        .video .time {
            background-color: rgba(51, 51, 51, .5);
            padding: 5px;

            position: absolute;
            right: 0px;
            bottom: 0px;
            border-top-left-radius: 5px;
        }

        .video .time p {
            color: white;
            font-weight: var(--fontSemiBold);
            font-size: 12px;
        }

        .video h2 {
            font-weight: var(--fontSemiBold);
            font-size: var(--fontSize20);
        }

        .video .text {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .video:hover .thumbnail.pic-matcha {
            background-size: 110% auto;
        }

        .video:hover .thumbnail.pic-train {
            background-size: auto 110%;
        }

        .video:hover .thumbnail.pic-faifo {
            background-size: auto 110%;
        }

        .videos-group {
            display: grid;
            grid-template-columns: repeat(3, 440px);
            gap: 30px;
        }

        /* open video */
        #overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, .8);

            display: none;
            justify-content: center;
            align-items: center;
        }

        #overlay .cancel {
            width: 60px;
            height: 60px;
            background-color: var(--mainColor1);
            font-size: 32px;
            border-radius: 100px;
            color: var(--mainColor2);

            position: absolute;
            top: 120px;
            right: 40px;
            cursor: pointer;

            transition: transform .2s ease;
        }

        #overlay .cancel:hover {
            transform: scale(1.5);
        }


        .video-wrapper {
            width: 80%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            margin-top: 80px;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        /* desktop: 993px -> 1420px -------------------------------------------------- */
        @media screen and (max-width: 1420px) {
            .videos-group {
                grid-template-columns: repeat(3, auto);
            }
            section {
                padding: 0 40px;
            }
            .video h2 {
                font-size: 18px;
            }
        }

        /* tablet: 769px -> 992px  -------------------------------------------------- */
        @media screen and (max-width: 992px) {
            .videos-group {
                grid-template-columns: repeat(2, auto);
            }
        }

        /* mobile: 360px -> 768px -------------------------------------------------- */
        @media screen and (max-width: 768px) {
            .videos-group {
                display: flex;
                flex-direction: column;
            }
            
            section {
                padding: 0 20px;
            }
            section .year {
                gap: 32px;
            }
            .title h1 {
                font-size: var(--fontSizeH1small);
            }
        }
    </style>

    <link rel="stylesheet" href="root_desktop.css" media="screen and (max-width: 1420px)">
    <link rel="stylesheet" href="root_tablet.css" media="screen and (max-width: 992px)">
    <link rel="stylesheet" href="root_mobile.css" media="screen and (max-width: 768px)">

</head>

    <div id="overlay">
        <div class="video-wrapper">
            <iframe id="popupYoutube" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
            </iframe>
        </div>
        <div onclick="off()" class="cancel center-flex">X</div>
    </div>
    <script>
        function onYoutube(url) {
            const iframe = document.getElementById("popupYoutube");
            iframe.src = url;
            document.getElementById("overlay").style.display = "flex";
        }

        function off() {
            const iframe = document.getElementById("popupYoutube");
            iframe.src = ""; // reset để dừng video
            document.getElementById("overlay").style.display = "none";
        }
    </script>

        /* navigation -------------------------------------------------- */
        nav {
            display: flex;
            justify-content: center;

            height: 80px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        nav a {
            color: var(--mainColor2);
        }

        nav a::after {
            background-color: var(--mainColor2);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* body general -------------------------------------------------- */
        section {
            width: 1380px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* title -------------------------------------------------- */
        .title {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .title h1 {
            font-weight: var(--fontRegular);
            font-size: var(--fontSizeH1);
        }

        .line {
            width: 1px;
            align-self: stretch;
            background-color: var(--mainColor2);
        }

        .heading .title h1.short {
            display: none;
        }

        /* desktop: 993px -> 1420px -------------------------------------------------- */
        @media screen and (max-width: 1420px) {
            section {
                padding: 0 40px;
            }
        }

        /* tablet: 769px -> 992px  -------------------------------------------------- */
        @media screen and (max-width: 992px) {}

        /* mobile: 360px -> 768px -------------------------------------------------- */
        @media screen and (max-width: 768px) {}
    </style>

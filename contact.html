    <style>
        body {
            margin-bottom: 0;
        }

        /* navigation */
        nav {
            display: flex;
            justify-content: center;
            gap: 80px;
            background-color: white;
            height: 80px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        nav a {
            color: var(--mainColor2);
        }

        nav a::after {
            background-color: var(--mainColor2);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* banner */
        section {
            width: 1380px;
            height: 920px;
            margin: 0 auto;
            padding: 0;
            background-image: url(pics/hoian/_MG_0983.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 20px;
        }

        .inside {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 40px;
            padding: 40px;
            background-color: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
        }

        /* white right part */
        .right-part {
            background-color: white;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            padding: 40px;
            gap: 80px;
            display: flex;
            flex-direction: column;
        }

        section h1 {
            width: 100%;
            height: 100%;
            color: white;
            padding: 40px;

            font-size: 40px;
            font-weight: 600;
        }

        /* info */
        .icon-box {
            width: 40px;
            height: 40px;
            background-color: var(--mainColor1);
            border-radius: 5px;
        }

        .icon-box svg {
            fill: white;
            width: 32px;
            height: 32px;
        }

        .box {
            flex-direction: column;
            align-items: flex-start;
            gap: 40px;

        }

        .box h2 {
            font-size: var(--fontSizeH1);
            font-weight: var(--fontRegular);
        }

        .icon-text {
            gap: 20px;
        }

        .box ul {
            display: flex;
            flex-direction: column;
            gap: 20px;
            list-style: none;
        }

        .box ul a {
            color: var(--mainColor2);
        }

        .box ul li {
            display: flex;
            align-items: center;
        }

        /* desktop: 993px -> 1420px -------------------------------------------------- */
        @media screen and (max-width: 1420px) {
            body {
                gap: 0;
                height: 100vh;
                margin-bottom: 0;
            }
            section {
                width: 100%;
                border-radius: 0;
                padding: 0;
            }
            .inside {
                border-radius: 0;
            }
        }

        /* tablet: 769px -> 992px  -------------------------------------------------- */
        @media screen and (max-width: 992px) {
            section {
                width: 100%;
            }
            section h1 {
                padding: 20px;
            }
        }

        /* mobile: 360px -> 768px -------------------------------------------------- */
        @media screen and (max-width: 768px) {
            .inside {
                flex-direction: column;
                padding: 20px;
            }
            .right-part {
                gap: 60px;
                padding: 32px;
            }
            .box h2 {
                font-size: var(--fontSizeH1small);
            }
            .icon-text {
                gap: 10px;
            }
            .right-part .box {
                padding: 0;
            }
        }
    </style>

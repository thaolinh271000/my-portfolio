    <style>
        body {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin-bottom: 0;

            animation: slider 30s linear infinite;
        }

        @keyframes slider {
            0% {
                background-image: url(pics/photowalk/_MG_1264.jpg);
            }

            25% {
                background-image: url(pics/photowalk/_MG_1406.jpg);
            }

            50% {
                background-image: url(pics/photowalk/_MG_1435.jpg);
            }

            75% {
                background-image: url(pics/hoian/_MG_0853.jpg);
            }

            100% {
                background-image: url(pics/hoian/_MG_0964.jpg);
            }
        }

        section {
            width: 100vw;
            height: 100vh;
            color: white;

            display: flex;
            flex-flow: column;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
        }

        .name {
            font-size: 100px;
            margin: 0;
        }

        .line {
            width: 1px;
            height: 54px;
            background-color: white;
        }

        .text {
            flex-flow: column;
            gap: 10px;
        }

        .text-group {
            gap: 40px;
        }

        body .part-middle {
            flex-flow: column;
            gap: 40px;
        }

        body .part-middle p {
            color: white;
            text-align: center;
        }

        .icon-button {
            width: 40px;
            height: 40px;
        }

        .icon-button svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .part-end {
            gap: 40px;
            height: 120px;
        }

        /* navigation */
        nav {
            height: 120px;
        }

        .sub-menu {
            background-color: transparent;
        }

        nav a,
        nav button {
            color: white;
        }

        nav a::after {
            background-color: white;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* icon button */
        .icon-button:hover {
            background-color: white;
            border-radius: 5px;
        }

        .icon-button:hover svg {
            fill: var(--mainColor2);
        }

        /* desktop: 993px -> 1200px -------------------------------------------------- */
        @media screen and (max-width: 1420px) {
            .name {
                font-size: 80px;
            }

            section {
                width: 200px;
            }
        }

        /* tablet: 769px -> 992px  -------------------------------------------------- */
        @media screen and (max-width: 992px) {
            .name {
                font-size: 60px;
            }
            .sub-menu {
                padding-top: 20px;
            }
        }

        /* mobile: 360px -> 768px -------------------------------------------------- */
        @media screen and (max-width: 768px) {
            .name {
                font-size: 40px;
            }
        }
    </style>

    <style>
        /* navigation */
        nav {
            display: flex;
            justify-content: center;
            gap: 80px;
            background-color: white;
            height: 80px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        nav a {
            color: var(--mainColor2);
        }

        nav a::after {
            background-color: var(--mainColor2);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* body general */
        section {
            width: 1380px;
            margin: 0 auto;
            gap: 40px;
            display: flex;
            flex-direction: column;
        }

        .photo-area {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* album title */
        .title {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .title h1 {
            font-weight: var(--fontRegular);
            font-size: var(--fontSizeH1);
        }

        .line {
            width: 1px;
            align-self: stretch;
            background-color: var(--mainColor2);
        }

        /* swiper */

        .mySwiperBig {
            width: 100%;
            height: 776px;
        }

        .mySwiperBig img {
            height: 100%;
        }

        .mySwiperSmall {
            width: 100%;
            height: 87.5px;
        }

        .mySwiperSmall .swiper-slide {
            width: 87.5px;
            height: 100%;
            overflow: hidden;
            opacity: 0.4;
        }

        .mySwiperSmall .swiper-slide-thumb-active {
            opacity: 1;
        }

        .mySwiperSmall img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        .special img {
            object-position: top;
        }

        .arrow {
            width: 60px;
            height: 60px;
            background-color: white;
            border-radius: 100px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .swiper-button-next::after,
        .swiper-button-prev::after {
            color: var(--mainColor2);
            font-size: 32px;
        }

        /* desktop: 993px -> 1420px -------------------------------------------------- */
        @media screen and (max-width: 1420px) {
            .mySwiperBig {
                height: auto;
                aspect-ratio: 3 / 2;
            }

            .mySwiperSmall {
                height: auto;
            }

            .mySwiperSmall .swiper-slide {
                width: auto;
                aspect-ratio: 1 / 1;
            }
        }

        /* tablet: 769px -> 992px  -------------------------------------------------- */
        @media screen and (max-width: 992px) {}

        /* mobile: 360px -> 768px -------------------------------------------------- */
        @media screen and (max-width: 768px) {
            section {
                gap: 20px;
            }

            .photo-area {
                gap: 20px;
            }

            .arrow {
                width: 40px;
                height: 40px;
            }

            .swiper-button-next::after,
            .swiper-button-prev::after {
                font-size: 20px;
            }

            .title h1 {
                font-size: var(--fontSizeH1small);
            }
        }
    </style>

    <!-- Initialize Swiper -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const startSlide = parseInt(params.get("slide")) || 0;

        var swiperThumb = new Swiper(".mySwiperSmall", {
            loop: true,
            spaceBetween: 10,
            slidesPerView: 10,
            freeMode: true,
            watchSlidesProgress: true,
        });

        var swiperBig = new Swiper(".mySwiperBig", {
            loop: true,
            spaceBetween: 10,
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            thumbs: {
                swiper: swiperThumb,
            },

            initialSlide: startSlide,

            keyboard: {
                enabled: true,
                onlyInViewport: true,
            },
        });
    </script>

    <style>
        /* navigation */
        nav {
            display: flex;
            justify-content: center;
            gap: 80px;
            background-color: white;
            height: 80px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        nav a {
            color: var(--mainColor2);
        }

        nav a::after {
            background-color: var(--mainColor2);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* body general */
        section {
            width: 1380px;
            margin: 0 auto;
            gap: 40px;
            display: flex;
            flex-direction: column;
            gap: 80px;
        }

        /* album title */
        .title {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .title h1 {
            font-weight: var(--fontRegular);
            font-size: var(--fontSizeH1);
        }

        .line {
            width: 1px;
            align-self: stretch;
            background-color: var(--mainColor2);
        }

        .album {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* photo grid */
        .photo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }

        .photo-grid a {
            width: 322.5px;
            height: 322.5px;
            border-radius: 5px;
            overflow: hidden;
        }

        .photo-grid a img {
            height: 100%;
            width: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(.2, .8, .2, 1);
        }

        .photo-grid .special img {
            object-position: top;
        }

        .photo-grid a img:hover {
            transform: scale(1.1);
        }
    </style>
</head>
